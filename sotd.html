<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sotd.css">
    <title>Song of the Day Calendar - The David Wheeler Containment Zone</title>
</head>
<body class="sotd-page">
    <!-- Header -->
    <header>
        <div class="site-title">
            <h1>SONG OF THE DAY 2026</h1>
        </div>
    </header>

    <main>
        <section class="window-container">
            <div class="main-window">
                <div class="window-header">
                    <span>365 Days of Songs</span>
                </div>
                <div class="window-body">
                    <p>A song for every day of the year. Hover over album art to see the song details.</p>
                    <div class="sotd-calendar" id="sotdCalendar">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Popup -->
    <div class="song-modal-overlay" id="songModalOverlay">
        <div class="song-modal" id="songModal">
            <button class="modal-close" id="modalClose">&times;</button>
            
            <div class="modal-content">
                <div class="modal-title-section">
                    <h2 id="modalTitle"></h2>
                </div>
                
                <div class="modal-cover">
                    <img id="modalCoverImg" src="" alt="Album cover">
                </div>

                <div class="modal-buttons">
  <button class="modal-nav-btn" id="prevSongBtn">Previous</button>
  <button class="modal-nav-btn" id="nextSongBtn">Next</button>
</div>
                
                <div class="modal-info">
                    <p><strong>Day:</strong> <span id="modalDay"></span></p>
                    <p><strong>Album:</strong> <span id="modalAlbum"></span></p>
                    <p><strong>Release Year:</strong> <span id="modalYear"></span></p>
                    <div id="modalNotesSection">
                        <p><strong>Notes:</strong></p>
                        <p id="modalNotes"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Back Link -->
    <footer style="text-align: center; margin-top: 20px;">
        <a href="music.html" style="color: #9933FF; text-decoration: underline;">← Back to Music</a>
    </footer>

    <script src="sotd.js"></script>
</body>
</html>
